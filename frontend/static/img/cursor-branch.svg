<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" width="32" height="32">
  <!-- Main branch: tip at (1,1), runs diagonal to bottom-right -->
  <path d="M 1.5 1.5 C 3 3.5 5.5 6.5 8.5 9.5 C 11.5 12.5 15 16 18.5 19.5 C 20.5 21.5 22 23 22.5 24"
        stroke="#6B3A1F" stroke-width="2.2" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
  <!-- Branch 1: splits upper-right from mid-point -->
  <path d="M 11 11.5 C 13 9.5 16 8 19 7.5 C 21 7 23 7.5 24.5 8.5"
        stroke="#6B3A1F" stroke-width="1.5" fill="none" stroke-linecap="round"/>
  <!-- Branch 2: smaller twig from upper branch -->
  <path d="M 17.5 8.5 C 18.5 6.5 20 5 22 4"
        stroke="#6B3A1F" stroke-width="1" fill="none" stroke-linecap="round"/>
  <!-- Branch 3: small twig mid-lower -->
  <path d="M 16.5 17 C 18.5 16 21 15.5 23.5 16"
        stroke="#6B3A1F" stroke-width="1.1" fill="none" stroke-linecap="round"/>
  <!-- Tiny tip twig -->
  <path d="M 21.5 23 C 23 22 25 21.5 27 22"
        stroke="#6B3A1F" stroke-width="0.9" fill="none" stroke-linecap="round"/>
  <!-- Rough texture on main branch (hand-drawn feel) -->
  <path d="M 5 5.5 C 5.5 5 6 5.5 5.5 6"
        stroke="#4A2510" stroke-width="0.7" fill="none" stroke-linecap="round" opacity="0.6"/>
  <path d="M 9.5 10 C 10 9.5 10.5 10 10 10.5"
        stroke="#4A2510" stroke-width="0.7" fill="none" stroke-linecap="round" opacity="0.6"/>
  <path d="M 14 15 C 14.5 14.5 15 15 14.5 15.5"
        stroke="#4A2510" stroke-width="0.7" fill="none" stroke-linecap="round" opacity="0.6"/>
</svg>
