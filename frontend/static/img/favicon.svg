<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" width="32" height="32">
  <defs>
    <filter id="fz" x="-15%" y="-15%" width="130%" height="130%">
      <feTurbulence type="fractalNoise" baseFrequency="0.06" numOctaves="3" seed="7"/>
      <feDisplacementMap in="SourceGraphic" scale="1.2" xChannelSelector="R" yChannelSelector="G"/>
    </filter>
  </defs>

  <!-- Ears -->
  <circle cx="6"  cy="7"  r="5" fill="#E2A52A" filter="url(#fz)"/>
  <circle cx="26" cy="8"  r="4" fill="#E2A52A" filter="url(#fz)"/>
  <circle cx="6"  cy="7"  r="3" fill="#9B7020" opacity="0.7"/>
  <circle cx="26" cy="8"  r="2.5" fill="#9B7020" opacity="0.7"/>

  <!-- Head -->
  <ellipse cx="16" cy="19" rx="13" ry="12" fill="#E2A52A" filter="url(#fz)"/>

  <!-- Leaf -->
  <path d="M 17 4 Q 21 1 22 6 Q 18 9 16 8 Q 15 5 17 4 Z" fill="#5aaa3a"/>

  <!-- Blush -->
  <ellipse cx="8"  cy="22" rx="4.5" ry="3"   fill="#D08020" opacity="0.8"/>
  <ellipse cx="23" cy="23" rx="4"   ry="3"   fill="#D08020" opacity="0.8"/>

  <!-- Eyes -->
  <circle cx="12" cy="17" r="1.8" fill="#2A1808"/>
  <circle cx="20" cy="15" r="1.3" fill="#2A1808"/>

  <!-- T-bar nose/mouth -->
  <rect x="13.5" y="21"  width="4.5" height="1.3" rx="0.6" fill="#2A1808"/>
  <rect x="15.2" y="22.3" width="1.3" height="3"   rx="0.6" fill="#2A1808"/>
</svg>
