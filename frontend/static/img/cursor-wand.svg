  <path d="M 4 3 C 4.5 3.5 4.2 4 3.8 3.5"
        stroke="#1E0810" stroke-width="1" fill="none" stroke-linecap="round" opacity="0.6"/>
  <path d="M 9 9.5 C 9.5 10 9.2 10.5 8.8 10"
        stroke="#1E0810" stroke-width="1" fill="none" stroke-linecap="round" opacity="0.5"/>
  <path d="M 15 17 C 15.5 17.5 15.2 18 14.8 17.5"
        stroke="#1E0810" stroke-width="1" fill="none" stroke-linecap="round" opacity="0.5"/>
  <!-- Dark pointed tip -->
  <ellipse cx="2.8" cy="2" rx="2" ry="2.5" fill="#1C0810" transform="rotate(-30 2.8 2)"/>
</svg>
