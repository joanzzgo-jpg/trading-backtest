<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 340 110" width="340" height="110">
  <defs>
    <radialGradient id="bodyGrad" cx="38%" cy="30%" r="65%">
      <stop offset="0%" stop-color="#2e4580"/>
      <stop offset="100%" stop-color="#0d1629"/>
    </radialGradient>
    <radialGradient id="faceGrad" cx="50%" cy="45%" r="60%">
      <stop offset="0%" stop-color="#1a2e60"/>
      <stop offset="100%" stop-color="#080e1e"/>
    </radialGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="2.5" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- Ambient glow behind character -->
  <circle cx="55" cy="57" r="52" fill="rgba(38,166,154,0.07)"/>

  <!-- Outer ring -->
  <circle cx="55" cy="57" r="49" fill="none" stroke="#26a69a" stroke-width="0.8" opacity="0.35"/>

  <!-- Body -->
  <circle cx="55" cy="57" r="47" fill="url(#bodyGrad)"/>

  <!-- Left ear -->
  <circle cx="31" cy="16" r="12" fill="#1a2750"/>
  <circle cx="31" cy="16" r="7.5" fill="#1f3068" opacity="0.65"/>

  <!-- Right ear -->
  <circle cx="79" cy="16" r="12" fill="#1a2750"/>
  <circle cx="79" cy="16" r="7.5" fill="#1f3068" opacity="0.65"/>

  <!-- Mini K-bar chart on forehead (between ears) -->
  <g transform="translate(41, 5)" filter="url(#glow)">
    <!-- Green candle 1 -->
    <line x1="4" y1="1" x2="4" y2="13" stroke="#26a69a" stroke-width="1.2"/>
    <rect x="1.5" y="3" width="5" height="7" fill="#26a69a" rx="1"/>
    <!-- Red candle (middle, tallest) -->
    <line x1="13.5" y1="-1" x2="13.5" y2="11" stroke="#ef5350" stroke-width="1.2"/>
    <rect x="11" y="1" width="5" height="7.5" fill="#ef5350" rx="1"/>
    <!-- Green candle 3 -->
    <line x1="23" y1="0" x2="23" y2="12" stroke="#26a69a" stroke-width="1.2"/>
    <rect x="20.5" y="1.5" width="5" height="8" fill="#26a69a" rx="1"/>
  </g>

  <!-- Face area -->
  <ellipse cx="55" cy="64" rx="35" ry="30" fill="url(#faceGrad)"/>

  <!-- Left eye white -->
  <circle cx="41" cy="51" r="11.5" fill="white"/>
  <!-- Right eye white -->
  <circle cx="69" cy="51" r="11.5" fill="white"/>

  <!-- Left pupil -->
  <circle cx="43" cy="51" r="7" fill="#04080f"/>
  <!-- Right pupil -->
  <circle cx="71" cy="51" r="7" fill="#04080f"/>

  <!-- Eye shine left -->
  <circle cx="45.5" cy="47.5" r="3" fill="white"/>
  <!-- Eye shine right -->
  <circle cx="73.5" cy="47.5" r="3" fill="white"/>

  <!-- Tiny nose -->
  <ellipse cx="55" cy="64" rx="3.5" ry="2.5" fill="#1e3060" opacity="0.8"/>

  <!-- Blush left -->
  <ellipse cx="24" cy="66" rx="9" ry="6" fill="rgba(239,83,80,0.28)"/>
  <!-- Blush right -->
  <ellipse cx="86" cy="66" rx="9" ry="6" fill="rgba(239,83,80,0.28)"/>

  <!-- Smile -->
  <path d="M 43 76 Q 55 88 67 76" stroke="#4fd1c5" stroke-width="3" fill="none" stroke-linecap="round"/>

  <!-- Tiny left paw -->
  <ellipse cx="12" cy="72" rx="9" ry="7" fill="#1c2a55"/>
  <ellipse cx="8"  cy="70" rx="4" ry="3.5" fill="#243068" opacity="0.7"/>

  <!-- Tiny right paw -->
  <ellipse cx="98" cy="72" rx="9" ry="7" fill="#1c2a55"/>
  <ellipse cx="102" cy="70" rx="4" ry="3.5" fill="#243068" opacity="0.7"/>

  <!-- Divider line -->
  <line x1="116" y1="20" x2="116" y2="90" stroke="#26a69a" stroke-width="0.8" opacity="0.4"/>

  <!-- Brand name "AHH" -->
  <text x="130" y="66"
        font-family="'Arial Black', Impact, Arial, sans-serif"
        font-size="48"
        font-weight="900"
        fill="#ffffff"
        letter-spacing="5">AHH</text>

  <!-- Tagline "TRADING" -->
  <text x="135" y="84"
        font-family="Arial, Helvetica, sans-serif"
        font-size="11.5"
        font-weight="500"
        fill="#26a69a"
        letter-spacing="7">TRADING</text>
</svg>
