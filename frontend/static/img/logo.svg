<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 340 110" width="340" height="110">
  <defs>
    <radialGradient id="bodyG" cx="35%" cy="28%" r="72%">
      <stop offset="0%" stop-color="#89b8ff"/>
      <stop offset="100%" stop-color="#4a7de8"/>
    </radialGradient>
    <radialGradient id="earG" cx="38%" cy="30%" r="65%">
      <stop offset="0%" stop-color="#6fa0f5"/>
      <stop offset="100%" stop-color="#3a6ad4"/>
    </radialGradient>
    <radialGradient id="shineG" cx="30%" cy="25%" r="70%">
      <stop offset="0%" stop-color="#ffffff"/>
      <stop offset="100%" stop-color="#ddefff"/>
    </radialGradient>
    <filter id="drop" x="-15%" y="-15%" width="130%" height="130%">
      <feDropShadow dx="0" dy="2" stdDeviation="3" flood-color="rgba(60,90,200,0.25)"/>
    </filter>
  </defs>

  <!-- Character group with shadow -->
  <g filter="url(#drop)">

    <!-- Ears -->
    <circle cx="29" cy="18" r="14" fill="url(#earG)"/>
    <circle cx="81" cy="18" r="14" fill="url(#earG)"/>
    <!-- Inner ear -->
    <circle cx="29" cy="18" r="8.5" fill="rgba(255,255,255,0.22)"/>
    <circle cx="81" cy="18" r="8.5" fill="rgba(255,255,255,0.22)"/>

    <!-- Body -->
    <circle cx="55" cy="59" r="47" fill="url(#bodyG)"/>

    <!-- Body highlight (top sheen) -->
    <ellipse cx="42" cy="32" rx="20" ry="12" fill="rgba(255,255,255,0.18)"/>

    <!-- ── Eyes ── -->
    <circle cx="38" cy="53" r="15"  fill="white"/>
    <circle cx="72" cy="53" r="15"  fill="white"/>

    <!-- Iris (soft sky blue ring) -->
    <circle cx="40" cy="53" r="10.5" fill="#c8e0ff"/>
    <circle cx="70" cy="53" r="10.5" fill="#c8e0ff"/>

    <!-- Pupils -->
    <circle cx="40" cy="53" r="7.5" fill="#1a2860"/>
    <circle cx="70" cy="53" r="7.5" fill="#1a2860"/>

    <!-- Primary shine -->
    <circle cx="43.5" cy="49" r="3.8" fill="url(#shineG)"/>
    <circle cx="73.5" cy="49" r="3.8" fill="url(#shineG)"/>

    <!-- Tiny secondary shine -->
    <circle cx="37.5" cy="57" r="1.8" fill="rgba(255,255,255,0.55)"/>
    <circle cx="67.5" cy="57" r="1.8" fill="rgba(255,255,255,0.55)"/>

    <!-- ── Blush ── -->
    <ellipse cx="19"  cy="68" rx="12" ry="7" fill="rgba(255,120,140,0.42)"/>
    <ellipse cx="91"  cy="68" rx="12" ry="7" fill="rgba(255,120,140,0.42)"/>

    <!-- ── Smile ── -->
    <path d="M 42 77 Q 55 91 68 77"
          stroke="#1ab5a0" stroke-width="3.5" fill="none" stroke-linecap="round"/>

    <!-- ── Mini K-bar chart on forehead ── -->
    <g transform="translate(44, 30)" opacity="0.88">
      <line x1="3"   y1="1" x2="3"   y2="10" stroke="#1fb89e" stroke-width="1.3"/>
      <rect x="0.5"  y="3"  width="5" height="6" fill="#1fb89e" rx="1"/>

      <line x1="11"  y1="-1" x2="11" y2="9"  stroke="#f06060" stroke-width="1.3"/>
      <rect x="8.5"  y="1"   width="5" height="6" fill="#f06060" rx="1"/>

      <line x1="19"  y1="0"  x2="19" y2="10" stroke="#1fb89e" stroke-width="1.3"/>
      <rect x="16.5" y="2"   width="5" height="7" fill="#1fb89e" rx="1"/>
    </g>

  </g>

  <!-- ── Brand text ── -->
  <!-- Thin separator line -->
  <line x1="120" y1="20" x2="120" y2="90"
        stroke="rgba(74,125,232,0.5)" stroke-width="1.2"/>

  <!-- AHH  -->
  <text x="134" y="66"
    font-family="'Arial Rounded MT Bold','Arial Black','Trebuchet MS',Arial,sans-serif"
    font-size="46" font-weight="900"
    fill="#ffffff" letter-spacing="5">AHH</text>

  <!-- TRADING -->
  <text x="138" y="83"
    font-family="Arial,Helvetica,sans-serif"
    font-size="11.5" font-weight="600"
    fill="#1ab5a0" letter-spacing="6.5">TRADING</text>
</svg>
