<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0" />
  <title>Trading Chart</title>
  <script src="https://unpkg.com/lightweight-charts@4.1.3/dist/lightweight-charts.standalone.production.js"></script>
  <link rel="stylesheet" href="/static/css/style.css?v={{ ver }}" />
</head>
<body>

<!-- ① 頂部工具列 -->
<header class="topbar">
  <div class="topbar-left">

    <!-- 側欄 toggle（桌面也顯示） -->
    <button id="sidebarToggle" class="tb-icon-btn tb-sidebar-btn" title="側欄">
      <svg width="16" height="12" viewBox="0 0 16 12"><rect width="16" height="1.8" rx=".9" fill="currentColor"/><rect y="5.1" width="16" height="1.8" rx=".9" fill="currentColor"/><rect y="10.2" width="16" height="1.8" rx=".9" fill="currentColor"/></svg>
    </button>

    <div class="tb-divider-v"></div>

    <!-- 標的選擇 -->
    <div class="tb-symbol-group">
      <select id="marketSelect" class="tb-mkt-select">
        <option value="crypto">Crypto</option>
        <option value="us">US</option>
        <option value="tw">TW</option>
      </select>
      <select id="exchangeSelect" class="tb-exc-select">
        <option value="pionex">Pionex</option>
        <option value="binance">Binance</option>
        <option value="bybit">Bybit</option>
        <option value="okx">OKX</option>
      </select>
      <div class="tb-symbol-wrap">
        <input id="symbolInput" class="tb-symbol-input" type="text" value="BTC/USDT" placeholder="BTC/USDT" />
        <svg class="tb-sym-caret" width="8" height="5" viewBox="0 0 8 5"><path d="M0 0L4 5L8 0" fill="currentColor"/></svg>
      </div>
    </div>

    <div class="tb-divider-v"></div>

    <!-- 時間框架 -->
    <div class="tf-group">
      <button class="tf-btn" data-tf="1M">1M</button>
      <button class="tf-btn" data-tf="1w">1W</button>
      <button class="tf-btn active" data-tf="1d">1D</button>
      <button class="tf-btn" data-tf="4h">4H</button>
      <button class="tf-btn" data-tf="1h">1H</button>
      <button class="tf-btn" data-tf="15m">15m</button>
    </div>

    <div class="tb-divider-v"></div>

    <!-- 圖表類型 -->
    <div class="chart-type-group" id="chartTypeGroup">
      <button class="ct-btn active" data-ct="candlestick" title="K線圖">
        <svg width="18" height="18" viewBox="0 0 18 18">
          <line x1="4.5" y1="1.5" x2="4.5" y2="16.5" stroke="currentColor" stroke-width="1.2"/>
          <rect x="2.5" y="5" width="4" height="6" rx=".6" fill="currentColor"/>
          <line x1="13.5" y1="1.5" x2="13.5" y2="16.5" stroke="currentColor" stroke-width="1.2"/>
          <rect x="11.5" y="7.5" width="4" height="5" rx=".6" fill="none" stroke="currentColor" stroke-width="1.2"/>
        </svg>
      </button>
      <button class="ct-btn" data-ct="bar" title="OHLC Bar">
        <svg width="18" height="18" viewBox="0 0 18 18">
          <line x1="5" y1="2.5" x2="5" y2="15.5" stroke="currentColor" stroke-width="1.3"/>
          <line x1="2" y1="6.5" x2="5" y2="6.5" stroke="currentColor" stroke-width="1.3"/>
          <line x1="5" y1="11.5" x2="8" y2="11.5" stroke="currentColor" stroke-width="1.3"/>
          <line x1="13" y1="3.5" x2="13" y2="14.5" stroke="currentColor" stroke-width="1.3"/>
          <line x1="10" y1="8" x2="13" y2="8" stroke="currentColor" stroke-width="1.3"/>
          <line x1="13" y1="12.5" x2="16" y2="12.5" stroke="currentColor" stroke-width="1.3"/>
        </svg>
      </button>
      <button class="ct-btn" data-ct="line" title="折線圖">
        <svg width="18" height="18" viewBox="0 0 18 18">
          <polyline points="1,14 5,9 9,11 13,5 17,7" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linejoin="round" stroke-linecap="round"/>
        </svg>
      </button>
      <button class="ct-btn" data-ct="area" title="面積圖">
        <svg width="18" height="18" viewBox="0 0 18 18">
          <polygon points="1,14 5,9 9,11 13,5 17,7 17,17 1,17" fill="currentColor" opacity=".3"/>
          <polyline points="1,14 5,9 9,11 13,5 17,7" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linejoin="round" stroke-linecap="round"/>
        </svg>
      </button>
    </div>

    <div class="tb-divider-v"></div>

    <!-- 指標按鈕 -->
    <button class="tb-indicators-btn" id="indicatorsToggle" title="外觀與指標">
      <svg width="15" height="15" viewBox="0 0 15 15">
        <polyline points="0,11 4,6 7,8.5 11,3 15,5.5" fill="none" stroke="currentColor" stroke-width="1.4" stroke-linejoin="round" stroke-linecap="round"/>
        <polyline points="0,7 3,4 6,6 10,1" fill="none" stroke="currentColor" stroke-width="1.4" stroke-linejoin="round" stroke-linecap="round" opacity=".45"/>
      </svg>
      指標
    </button>

    <div class="tb-divider-v"></div>

    <!-- 日期範圍 -->
    <input id="startDate" class="tb-input tb-date" type="date" />
    <span class="tb-sep">→</span>
    <input id="endDate"   class="tb-input tb-date" type="date" />
    <button id="loadBtn" class="btn-load">載入</button>

  </div>

  <div class="topbar-right">
    <button id="replayModeBtn" class="btn-mode">
      <svg width="13" height="13" viewBox="0 0 13 13"><circle cx="6.5" cy="6.5" r="5.5" fill="none" stroke="currentColor" stroke-width="1.2"/><path d="M5 4.2L9.5 6.5L5 8.8V4.2Z" fill="currentColor"/></svg>
      <span>重播</span>
    </button>
    <button id="tickerToggle" class="tb-icon-btn" title="行情列表">
      <svg width="14" height="14" viewBox="0 0 14 14"><rect width="6" height="1.6" rx=".8" fill="currentColor"/><rect y="4" width="14" height="1.6" rx=".8" fill="currentColor"/><rect y="8" width="14" height="1.6" rx=".8" fill="currentColor"/><rect y="12" width="10" height="1.6" rx=".8" fill="currentColor"/></svg>
    </button>
  </div>
</header>

<!-- ② 符號資訊列 -->
<div class="symbol-bar">
  <span id="symbolName" class="sym-name">—</span>
  <span id="symExchange" class="sym-tag"></span>
  <span class="sym-divider">|</span>
  <span class="sym-label">O</span><span id="symO" class="sym-val">—</span>
  <span class="sym-label">H</span><span id="symH" class="sym-val sym-high">—</span>
  <span class="sym-label">L</span><span id="symL" class="sym-val sym-low">—</span>
  <span class="sym-label">C</span><span id="symC" class="sym-val">—</span>
  <span class="sym-label">V</span><span id="symV" class="sym-val">—</span>
  <span id="symChg" class="sym-chg"></span>
  <span id="realtimeDot" class="realtime-dot hidden" title="即時更新中"></span>
</div>

<!-- 遮罩 -->
<div id="panelOverlay" class="panel-overlay hidden"></div>

<!-- ③ 主體 -->
<div class="body-layout">

  <!-- 左側設定面板 -->
  <aside class="sidebar" id="sidebar">

    <!-- 系統外觀 -->
    <div class="sidebar-section">
      <div class="section-title collapsible" id="sysColorToggle">
        系統外觀 <span class="toggle-arrow">▸</span>
      </div>
      <div id="sysColorPanel" class="color-panel hidden">
        <div class="color-row"><label>主背景</label>  <input type="color" id="sc-bg"     value="#131722" /></div>
        <div class="color-row"><label>面板背景</label><input type="color" id="sc-panel"  value="#1e222d" /></div>
        <div class="color-row"><label>邊框色</label>  <input type="color" id="sc-border" value="#2a2e39" /></div>
        <div class="color-row"><label>主文字</label>  <input type="color" id="sc-text"   value="#d1d4dc" /></div>
        <div class="color-row"><label>次要文字</label><input type="color" id="sc-muted"  value="#787b86" /></div>
        <div class="color-row"><label>強調色</label>  <input type="color" id="sc-blue"   value="#2962ff" /></div>
        <button id="resetSysColors" class="btn-reset">重設預設色</button>
      </div>
    </div>

  </aside>

  <!-- 左側繪圖工具欄 -->
  <div class="draw-toolbar" id="drawToolbar">
    <button class="dt-btn active" data-tool="pointer" title="游標 (Esc)">
      <svg width="15" height="15" viewBox="0 0 15 15"><path d="M2.5 1L2.5 11.5L5.5 8.5L7.2 13L8.8 12.3L7.1 7.8L11.5 7.8Z" fill="currentColor"/></svg>
    </button>
    <button class="dt-btn" data-tool="crosshair" title="十字線">
      <svg width="15" height="15" viewBox="0 0 15 15"><line x1="7.5" y1="1" x2="7.5" y2="14" stroke="currentColor" stroke-width="1.3"/><line x1="1" y1="7.5" x2="14" y2="7.5" stroke="currentColor" stroke-width="1.3"/><circle cx="7.5" cy="7.5" r="2.3" fill="none" stroke="currentColor" stroke-width="1.2"/></svg>
    </button>

    <div class="dt-sep"></div>

    <button class="dt-btn" data-tool="trendline" title="趨勢線">
      <svg width="15" height="15" viewBox="0 0 15 15"><line x1="2" y1="13" x2="13" y2="2" stroke="currentColor" stroke-width="1.3"/><circle cx="2" cy="13" r="1.5" fill="currentColor"/><circle cx="13" cy="2" r="1.5" fill="currentColor"/></svg>
    </button>
    <button class="dt-btn" data-tool="hline" title="水平線">
      <svg width="15" height="15" viewBox="0 0 15 15"><line x1="1" y1="7.5" x2="14" y2="7.5" stroke="currentColor" stroke-width="1.3"/><circle cx="3.5" cy="7.5" r="1.5" fill="currentColor"/><circle cx="11.5" cy="7.5" r="1.5" fill="currentColor"/></svg>
    </button>
    <button class="dt-btn" data-tool="ray" title="射線">
      <svg width="15" height="15" viewBox="0 0 15 15"><line x1="2" y1="13" x2="13" y2="2" stroke="currentColor" stroke-width="1.3" stroke-dasharray="3 2"/><line x1="2" y1="13" x2="7.5" y2="7.5" stroke="currentColor" stroke-width="1.3"/><circle cx="2" cy="13" r="1.5" fill="currentColor"/></svg>
    </button>
    <button class="dt-btn" data-tool="vline" title="垂直線">
      <svg width="15" height="15" viewBox="0 0 15 15"><line x1="7.5" y1="1" x2="7.5" y2="14" stroke="currentColor" stroke-width="1.3"/><circle cx="7.5" cy="4" r="1.5" fill="currentColor"/><circle cx="7.5" cy="11" r="1.5" fill="currentColor"/></svg>
    </button>

    <div class="dt-sep"></div>

    <button class="dt-btn" data-tool="fib" title="費波那契">
      <svg width="15" height="15" viewBox="0 0 15 15"><line x1="1" y1="4" x2="14" y2="4" stroke="currentColor" stroke-width="1"/><line x1="1" y1="7.5" x2="14" y2="7.5" stroke="currentColor" stroke-width="1.3"/><line x1="1" y1="11" x2="14" y2="11" stroke="currentColor" stroke-width="1"/><text x="1.5" y="3.2" font-size="3.5" fill="currentColor" font-family="monospace">0.618</text></svg>
    </button>
    <button class="dt-btn" data-tool="longpos" title="做多盈虧比">
      <svg width="15" height="15" viewBox="0 0 15 15">
        <rect x="1" y="4" width="13" height="4" fill="rgba(38,166,154,0.4)" stroke="#26a69a" stroke-width="0.8"/>
        <rect x="1" y="8" width="13" height="4" fill="rgba(239,83,80,0.4)" stroke="#ef5350" stroke-width="0.8"/>
        <line x1="1" y1="8" x2="14" y2="8" stroke="white" stroke-width="1.2"/>
      </svg>
    </button>
    <button class="dt-btn" data-tool="shortpos" title="做空盈虧比">
      <svg width="15" height="15" viewBox="0 0 15 15">
        <rect x="1" y="3" width="13" height="4" fill="rgba(239,83,80,0.4)" stroke="#ef5350" stroke-width="0.8"/>
        <rect x="1" y="7" width="13" height="4" fill="rgba(38,166,154,0.4)" stroke="#26a69a" stroke-width="0.8"/>
        <line x1="1" y1="7" x2="14" y2="7" stroke="white" stroke-width="1.2"/>
      </svg>
    </button>
    <button class="dt-btn" data-tool="text" title="文字">
      <svg width="15" height="15" viewBox="0 0 15 15"><text x="2" y="13" font-size="14" fill="currentColor" font-family="sans-serif" font-weight="700">T</text></svg>
    </button>

    <div class="dt-sep"></div>

    <button class="dt-btn dt-eraser" data-tool="eraser" title="清除工具">
      <svg width="15" height="15" viewBox="0 0 15 15"><path d="M13 2.5L11 1L1.5 8L4 11.5L6 13.5L14.5 6L13 2.5Z" fill="none" stroke="currentColor" stroke-width="1.2" stroke-linejoin="round"/><line x1="4" y1="11.5" x2="8.5" y2="7" stroke="currentColor" stroke-width="1.2"/></svg>
    </button>
  </div>

  <!-- 圖表區 -->
  <div class="charts-container" id="chartsContainer">

    <!-- 主圖 -->
    <div class="chart-pane" id="mainPane" style="flex:5">
      <div class="pane-legend">
        <span class="leg-item leg-toggle" id="legBB"><span class="leg-dot" style="background:#42a5f5;border-color:#42a5f5"></span><span class="leg-val">BB(20,2)</span></span>
        <span class="leg-item leg-toggle" id="legCRT"><span class="leg-dot" style="background:#26a69a;border-color:#26a69a"></span><span class="leg-val">CRT(3)</span></span>
        <span class="leg-item leg-toggle" id="legKDJCross"><span class="leg-dot" style="background:#26a69a;border-color:#26a69a"></span><span class="leg-val">KDJ首叉</span></span>
        <span class="leg-item leg-toggle" id="legResonance"><span class="leg-dot" style="background:#ff9800;border-color:#ff9800"></span><span class="leg-val">共振</span></span>
        <span class="leg-item leg-toggle" id="legVol"><span class="leg-dot" style="background:#787b86;border-color:#787b86"></span><span class="leg-val">VOL</span></span>
      </div>
      <div class="pane-body" id="mainChart"></div>
    </div>

    <div class="pane-divider" data-target="mainPane"></div>

    <!-- KDJ -->
    <div class="chart-pane" id="kdjPane" style="flex:1">
      <div class="pane-legend">
        <span class="leg-item leg-toggle" id="legK" style="color:#f23645"><span class="leg-dot" style="background:#f23645;border-color:#f23645"></span><span class="leg-val">K —</span></span>
        <span class="leg-item leg-toggle" id="legD" style="color:#1e88e5"><span class="leg-dot" style="background:#1e88e5;border-color:#1e88e5"></span><span class="leg-val">D —</span></span>
        <span class="leg-item leg-toggle" id="legJ" style="color:#ff9800"><span class="leg-dot" style="background:#ff9800;border-color:#ff9800"></span><span class="leg-val">J —</span></span>
        <span class="leg-item" id="legKdjH20"><span class="leg-dot" style="background:#4a4a6a;border-color:#4a4a6a"></span><span class="leg-val">20</span></span>
        <span class="leg-item" id="legKdjH50"><span class="leg-dot" style="background:#666688;border-color:#666688"></span><span class="leg-val">50</span></span>
        <span class="leg-item" id="legKdjH80"><span class="leg-dot" style="background:#4a4a6a;border-color:#4a4a6a"></span><span class="leg-val">80</span></span>
        <button class="pane-collapse-btn" data-pane="kdjPane" title="收合">−</button>
      </div>
      <div class="pane-body" id="kdjChart"></div>
    </div>

    <div class="pane-divider" data-target="kdjPane"></div>

    <!-- RSI -->
    <div class="chart-pane" id="rsiPane" style="flex:1">
      <div class="pane-legend">
        <span class="leg-item leg-toggle" id="legRsi14" style="color:#7e57c2"><span class="leg-dot" style="background:#7e57c2;border-color:#7e57c2"></span><span class="leg-val">RSI 14 —</span></span>
        <span class="leg-item leg-toggle" id="legRsi7"  style="color:#ef5350"><span class="leg-dot" style="background:#ef5350;border-color:#ef5350"></span><span class="leg-val">RSI 7 —</span></span>
        <span class="leg-item" id="legRsiH30"><span class="leg-dot" style="background:#4a4a6a;border-color:#4a4a6a"></span><span class="leg-val">30</span></span>
        <span class="leg-item" id="legRsiH50"><span class="leg-dot" style="background:#666688;border-color:#666688"></span><span class="leg-val">50</span></span>
        <span class="leg-item" id="legRsiH70"><span class="leg-dot" style="background:#4a4a6a;border-color:#4a4a6a"></span><span class="leg-val">70</span></span>
        <button class="pane-collapse-btn" data-pane="rsiPane" title="收合">−</button>
      </div>
      <div class="pane-body" id="rsiChart"></div>
    </div>

    <div class="pane-divider" data-target="rsiPane"></div>

    <!-- MACD -->
    <div class="chart-pane" id="macdPane" style="flex:1">
      <div class="pane-legend">
        <span class="leg-item leg-toggle" id="legMacd"     style="color:#2196f3"><span class="leg-dot" style="background:#2196f3;border-color:#2196f3"></span><span class="leg-val">MACD —</span></span>
        <span class="leg-item leg-toggle" id="legMacdSig"  style="color:#ff9800"><span class="leg-dot" style="background:#ff9800;border-color:#ff9800"></span><span class="leg-val">Signal —</span></span>
        <span class="leg-item leg-toggle" id="legMacdHist" style="color:#888"><span class="leg-dot" style="background:#888;border-color:#888"></span><span class="leg-val">Hist —</span></span>
        <button class="pane-collapse-btn" data-pane="macdPane" title="收合">−</button>
      </div>
      <div class="pane-body" id="macdChart"></div>
    </div>

  </div>

  <!-- 右側行情列表 -->
  <div class="ticker-panel" id="tickerPanel">

    <!-- 合約行情 -->
    <div class="ticker-hd">
      <span class="ticker-title">合約行情</span>
      <div class="tk-seg">
        <button class="tk-seg-btn active" data-sort="desc">漲↑</button>
        <button class="tk-seg-btn" data-sort="asc">跌↓</button>
        <button class="tk-seg-btn" data-sort="vol">量</button>
        <button class="tk-seg-btn" data-sort="wl">★</button>
      </div>
    </div>
    <input id="tickerSearch" class="tk-search" type="text" placeholder="搜尋標的…" />
    <div class="ticker-list" id="tickerList"><div class="tk-loading">載入中…</div></div>
  </div>

</div>

<!-- ④ 重播控制列 -->
<div id="replayBar" class="replay-bar hidden">
  <button id="replayExit"  class="rp-btn rp-exit" title="結束重播">✕ 離開</button>
  <div class="rp-divider"></div>
  <button id="replayStepB" class="rp-btn rp-step" title="往前一根">◀</button>
  <button id="replayPlay"  class="rp-btn rp-play" title="播放/暫停">▶</button>
  <button id="replayStepF" class="rp-btn rp-step" title="往後一根">▶|</button>
  <div class="rp-divider"></div>
  <div class="rp-speeds">
    <button class="rp-speed active" data-speed="500">1×</button>
    <button class="rp-speed" data-speed="250">2×</button>
    <button class="rp-speed" data-speed="100">5×</button>
    <button class="rp-speed" data-speed="40">25×</button>
  </div>
  <div class="rp-divider"></div>
  <span id="replayDate" class="rp-date">—</span>
  <span id="replayProgress" class="rp-progress"></span>
</div>

<!-- Symbol Search Modal -->
<div id="symOverlay" class="sym-overlay hidden">
  <div class="sym-modal">
    <div class="sym-modal-hd">
      <div class="sym-modal-search-wrap">
        <svg class="sym-search-icon" width="16" height="16" viewBox="0 0 16 16"><circle cx="6.5" cy="6.5" r="4.5" fill="none" stroke="#787b86" stroke-width="1.5"/><line x1="10" y1="10" x2="14" y2="14" stroke="#787b86" stroke-width="1.5" stroke-linecap="round"/></svg>
        <input id="symModalInput" class="sym-modal-input" type="text" placeholder="搜尋合約標的…" autocomplete="off" />
        <button id="symModalClear" class="sym-modal-clear hidden">✕</button>
      </div>
    </div>
    <div class="sym-modal-tabs" id="symModalTabs">
      <button class="sym-tab active" data-market="futures">永續合約</button>
      <button class="sym-tab" data-market="spot">現貨</button>
      <button class="sym-tab" data-market="us"  style="display:none">美股</button>
      <button class="sym-tab" data-market="tw"  style="display:none">台股</button>
    </div>
    <div class="sym-modal-list" id="symModalList">
      <div class="sym-loading">載入中…</div>
    </div>
  </div>
</div>

<script src="/static/js/app.js?v={{ ver }}"></script>
</body>
</html>
