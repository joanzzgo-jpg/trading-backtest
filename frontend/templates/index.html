<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0" />
  <title>回測系統</title>
  <script src="https://unpkg.com/lightweight-charts@4.1.3/dist/lightweight-charts.standalone.production.js"></script>
  <link rel="stylesheet" href="/static/css/style.css?v=16" />
</head>
<body>

<!-- ① 頂部工具列 -->
<header class="topbar">
  <div class="topbar-left">
    <button id="sidebarToggle" class="btn-sidebar-toggle" title="側欄">☰</button>
    <select id="marketSelect" class="tb-select">
      <option value="crypto">加密貨幣</option>
      <option value="tw">台股</option>
    </select>
    <select id="exchangeSelect" class="tb-select">
      <option value="pionex">Pionex</option>
      <option value="binance">Binance</option>
      <option value="bybit">Bybit</option>
      <option value="okx">OKX</option>
    </select>
    <input id="symbolInput" class="tb-input" type="text" value="BTC/USDT" placeholder="BTC/USDT" />
    <div class="tf-group">
      <button class="tf-btn" data-tf="1M">月</button>
      <button class="tf-btn" data-tf="1w">週</button>
      <button class="tf-btn active" data-tf="1d">日</button>
      <button class="tf-btn" data-tf="4h">4H</button>
      <button class="tf-btn" data-tf="1h">1H</button>
      <button class="tf-btn" data-tf="15m">15m</button>
    </div>
    <input id="startDate" class="tb-input tb-date" type="date" value="2023-01-01" />
    <span class="tb-sep">→</span>
    <input id="endDate"   class="tb-input tb-date" type="date" value="2024-12-31" />
    <button id="loadBtn" class="btn-load">載入</button>
  </div>
  <div class="topbar-right">
    <button id="screenshotBtn" class="btn-icon" title="截圖">📷</button>
    <button id="backtestModeBtn" class="btn-mode">回測模式</button>
  </div>
</header>

<!-- ② 符號資訊列 -->
<div class="symbol-bar">
  <span id="symbolName" class="sym-name">—</span>
  <span id="symExchange" class="sym-tag"></span>
  <span class="sym-divider">|</span>
  <span class="sym-label">開</span><span id="symO" class="sym-val">—</span>
  <span class="sym-label">高</span><span id="symH" class="sym-val sym-high">—</span>
  <span class="sym-label">低</span><span id="symL" class="sym-val sym-low">—</span>
  <span class="sym-label">收</span><span id="symC" class="sym-val">—</span>
  <span class="sym-label">量</span><span id="symV" class="sym-val">—</span>
  <span id="symChg" class="sym-chg"></span>
  <span id="realtimeDot" class="realtime-dot hidden" title="即時更新中"></span>
</div>

<!-- ③ 主體 -->
<div class="body-layout">

  <!-- 左側面板 -->
  <aside class="sidebar" id="sidebar">

    <!-- 回測區塊 -->
    <div id="backtestPanel" class="hidden">
      <div class="sidebar-section">
        <div class="section-title">策略</div>
        <select id="strategySelect" class="s-select"></select>
        <div id="strategyParams" class="strategy-params"></div>
      </div>
      <div class="sidebar-section">
        <div class="section-title">回測參數</div>
        <div class="param-row"><label>初始資金</label><input id="capital"    type="number" value="100000" /></div>
        <div class="param-row"><label>倉位 %</label>  <input id="sizePct"   type="number" value="10" min="1" max="100" /></div>
        <div class="param-row"><label>手續費 %</label><input id="commission" type="number" value="0.1" step="0.01" /></div>
        <div class="param-row"><label>滑點 %</label>  <input id="slippage"  type="number" value="0.05" step="0.01" /></div>
        <div class="param-row">
          <label>允許做空</label>
          <input id="allowShort" type="checkbox" style="width:auto;margin-left:auto" />
        </div>
      </div>
      <div class="sidebar-section">
        <button id="backtestBtn" class="btn-run-backtest" disabled>▶ 執行回測</button>
      </div>
    </div>

    <!-- 外觀顏色 -->
    <div class="sidebar-section">
      <div class="section-title collapsible" id="colorToggle">
        外觀顏色 <span class="toggle-arrow">▸</span>
      </div>
      <div id="colorPanel" class="color-panel hidden">
        <div class="color-row"><label>漲 K 棒</label>  <input type="color" id="c-up"      value="#ef5350" /></div>
        <div class="color-row"><label>跌 K 棒</label>  <input type="color" id="c-down"    value="#26a69a" /></div>
        <div class="color-row"><label>BB 上軌</label>  <input type="color" id="c-bbU"     value="#42a5f5" /></div>
        <div class="color-row"><label>BB 中軌</label>  <input type="color" id="c-bbM"     value="#ffcc02" /></div>
        <div class="color-row"><label>BB 下軌</label>  <input type="color" id="c-bbL"     value="#42a5f5" /></div>
        <div class="color-row"><label>KDJ K</label>    <input type="color" id="c-kdjK"    value="#f23645" /></div>
        <div class="color-row"><label>KDJ D</label>    <input type="color" id="c-kdjD"    value="#1e88e5" /></div>
        <div class="color-row"><label>KDJ J</label>    <input type="color" id="c-kdjJ"    value="#ff9800" /></div>
        <div class="color-row hl-row">
          <label>KDJ 水平線</label>
          <span class="hl-inputs">
            <input type="color"  id="c-kdjHL" value="#aaaaaa" title="顏色" />
            <input type="number" id="o-kdjHL" value="25" min="0" max="100" class="hl-num" title="透明度%" />
            <input type="number" id="w-kdjHL" value="1"  min="1" max="5"   class="hl-num" title="粗細px" />
          </span>
        </div>
        <div class="color-row"><label>RSI 14</label>   <input type="color" id="c-rsi14"   value="#7e57c2" /></div>
        <div class="color-row"><label>RSI 7</label>    <input type="color" id="c-rsi7"    value="#ef5350" /></div>
        <div class="color-row hl-row">
          <label>RSI 水平線</label>
          <span class="hl-inputs">
            <input type="color"  id="c-rsiHL" value="#aaaaaa" title="顏色" />
            <input type="number" id="o-rsiHL" value="25" min="0" max="100" class="hl-num" title="透明度%" />
            <input type="number" id="w-rsiHL" value="1"  min="1" max="5"   class="hl-num" title="粗細px" />
          </span>
        </div>
        <div class="color-row"><label>MACD</label>     <input type="color" id="c-macd"    value="#2196f3" /></div>
        <div class="color-row"><label>MACD 信號</label><input type="color" id="c-macdSig" value="#ff9800" /></div>
        <div class="color-row"><label>CRT 看多</label> <input type="color" id="c-crtBull" value="#26a69a" /></div>
        <div class="color-row"><label>CRT 看空</label> <input type="color" id="c-crtBear" value="#ef5350" /></div>
        <div class="color-row"><label>背景色</label>   <input type="color" id="c-bg"      value="#1e222d" /></div>
        <div class="color-row">
          <label>量 MA 期數</label>
          <input type="number" id="volMaPeriod" value="5" min="1" max="50" class="hl-num" />
        </div>
        <button id="resetColors" class="btn-reset">重設預設色</button>
      </div>
    </div>

    <!-- 績效摘要 -->
    <div id="statsPanel" class="sidebar-section hidden">
      <div class="section-title">績效摘要</div>
      <div id="statsContent"></div>
    </div>

  </aside>

  <!-- 圖表區 -->
  <div class="charts-container" id="chartsContainer">

    <!-- 主圖 -->
    <div class="chart-pane" id="mainPane" style="flex:5">
      <div class="pane-legend">
        <span class="leg-item leg-toggle" id="legBB">BB(20,2)</span>
        <span class="leg-item leg-toggle" id="legCRT" style="color:#26a69a">CRT(3)</span>
      </div>
      <div class="pane-body" id="mainChart"></div>
    </div>

    <div class="pane-divider" data-target="mainPane"></div>

    <!-- 成交量 -->
    <div class="chart-pane" id="volPane" style="flex:1">
      <div class="pane-legend">
        <span class="leg-item leg-toggle" id="legVol">VOL</span>
        <button class="pane-collapse-btn" data-pane="volPane" title="收合">−</button>
      </div>
      <div class="pane-body" id="volChart"></div>
    </div>

    <div class="pane-divider" data-target="volPane"></div>

    <!-- KDJ -->
    <div class="chart-pane" id="kdjPane" style="flex:1">
      <div class="pane-legend">
        <span class="leg-item leg-toggle" id="legK" style="color:#f23645">K —</span>
        <span class="leg-item leg-toggle" id="legD" style="color:#1e88e5">D —</span>
        <span class="leg-item leg-toggle" id="legJ" style="color:#ff9800">J —</span>
        <button class="pane-collapse-btn" data-pane="kdjPane" title="收合">−</button>
      </div>
      <div class="pane-body" id="kdjChart"></div>
    </div>

    <div class="pane-divider" data-target="kdjPane"></div>

    <!-- RSI -->
    <div class="chart-pane" id="rsiPane" style="flex:1">
      <div class="pane-legend">
        <span class="leg-item leg-toggle" id="legRsi14" style="color:#7e57c2">RSI 14 —</span>
        <span class="leg-item leg-toggle" id="legRsi7"  style="color:#ef5350">RSI 7 —</span>
        <button class="pane-collapse-btn" data-pane="rsiPane" title="收合">−</button>
      </div>
      <div class="pane-body" id="rsiChart"></div>
    </div>

    <div class="pane-divider" data-target="rsiPane"></div>

    <!-- MACD -->
    <div class="chart-pane" id="macdPane" style="flex:1">
      <div class="pane-legend">
        <span class="leg-item leg-toggle" id="legMacd"    style="color:#2196f3">MACD —</span>
        <span class="leg-item leg-toggle" id="legMacdSig" style="color:#ff9800">Signal —</span>
        <span class="leg-item leg-toggle" id="legMacdHist" style="color:#888">Hist —</span>
        <button class="pane-collapse-btn" data-pane="macdPane" title="收合">−</button>
      </div>
      <div class="pane-body" id="macdChart"></div>
    </div>

    <!-- 資金曲線（回測時顯示）-->
    <div class="pane-divider hidden" id="equityDivider" data-target="macdPane"></div>
    <div class="chart-pane hidden" id="equityPane" style="flex:1.5">
      <div class="pane-legend">
        <span class="leg-item" style="color:#26a69a">資金曲線</span>
      </div>
      <div class="pane-body" id="equityChart"></div>
    </div>

  </div>
</div>

<!-- ④ 交易明細（底部） -->
<div class="trade-drawer hidden" id="tradeDrawer">
  <div class="drawer-header">
    <span>交易明細</span>
    <span id="tradeSummary" class="trade-summary"></span>
    <button id="exportCsvBtn" class="btn-export">↓ CSV</button>
    <button id="drawerClose"  class="drawer-close">✕</button>
  </div>
  <div class="table-wrap">
    <table id="tradeTable">
      <thead>
        <tr>
          <th>進場</th><th>出場</th><th>向</th>
          <th>進場價</th><th>出場價</th><th>數量</th>
          <th>損益</th><th>%</th><th>原因</th>
        </tr>
      </thead>
      <tbody></tbody>
    </table>
  </div>
</div>

<script src="/static/js/app.js?v=16"></script>
</body>
</html>
